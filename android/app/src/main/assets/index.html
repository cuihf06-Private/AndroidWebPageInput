<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>登录 - TestApp</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 2px 20px rgba(0,0,0,0.1);
      padding: 40px 32px;
      width: 100%;
      max-width: 400px;
    }
    h1 { font-size: 24px; color: #1a1a1a; margin-bottom: 8px; text-align: center; }
    .subtitle { text-align: center; color: #666; font-size: 14px; margin-bottom: 32px; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; font-weight: 500; color: #333; margin-bottom: 8px; }
    input {
      width: 100%; padding: 12px 16px;
      border: 1.5px solid #ddd; border-radius: 8px;
      font-size: 16px; color: #1a1a1a; background: #fafafa;
      outline: none; transition: border-color 0.2s;
      -webkit-appearance: none; appearance: none;
    }
    input:focus { border-color: #4f46e5; background: white; }
    input::placeholder { color: #aaa; }
    button[type="submit"] {
      width: 100%; padding: 13px; background: #4f46e5; color: white;
      border: none; border-radius: 8px; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 8px; transition: background 0.2s;
    }
    button[type="submit"]:active { background: #4338ca; }
    .message { margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; text-align: center; display: none; }
    .message.success { background: #d1fae5; color: #065f46; display: block; }
    .message.error { background: #fee2e2; color: #991b1b; display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>登录</h1>
    <p class="subtitle">长按选择测试 — 请输入任意用户名密码进入</p>
    <form id="mainForm">
      <div class="form-group">
        <label for="username">用户名</label>
        <input type="text" id="username" name="username" placeholder="请输入用户名"
               autocomplete="username" autocorrect="off" autocapitalize="off" spellcheck="false" required />
      </div>
      <div class="form-group">
        <label for="password">密码</label>
        <input type="password" id="password" name="password" placeholder="请输入密码"
               autocomplete="current-password" required />
      </div>
      <button type="submit">登录</button>
      <div id="message" class="message"></div>
    </form>
  </div>

  <script>
    // Self-contained login: any non-empty username/password passes.
    // Goes straight to the chat page bundled next to this file.
    document.getElementById('mainForm').addEventListener('submit', function(e) {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const msgEl = document.getElementById('message');
      msgEl.className = 'message';
      msgEl.textContent = '';

      if (!username || !password) {
        msgEl.className = 'message error';
        msgEl.textContent = '请填写用户名和密码';
        return;
      }

      msgEl.className = 'message success';
      msgEl.textContent = '登录成功';
      setTimeout(function() {
        // Pass the username to the chat page via URL hash (file:// has no cookies cross-page)
        window.location.href = 'chat.html#user=' + encodeURIComponent(username);
      }, 500);
    });
  </script>
</body>
</html>
